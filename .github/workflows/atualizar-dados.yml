name: Atualizar Taxas BCB

on:
  schedule:
    # 06h e 18h horário de Brasília (UTC-3) → 09h e 21h UTC, seg a sex
    - cron: '0 9 * * 1-5'
    - cron: '0 21 * * 1-5'
  workflow_dispatch:

jobs:
  atualizar-taxas:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout do repositório
        uses: actions/checkout@v4

      - name: Buscar todos os dados do Banco Central
        run: |
          echo "=== Selic efetiva (SGS 4189) ==="
          curl -sf --max-time 15 \
            "https://api.bcb.gov.br/dados/serie/bcdata.sgs.4189/dados/ultimos/1?formato=json" \
            -o selic_raw.json || echo "[]" > selic_raw.json

          echo "=== Selic meta - decisão Copom (SGS 432) ==="
          curl -sf --max-time 15 \
            "https://api.bcb.gov.br/dados/serie/bcdata.sgs.432/dados/ultimos/1?formato=json" \
            -o selic_meta_raw.json || echo "[]" > selic_meta_raw.json

          echo "=== IPCA acumulado 12m (SGS 13522) ==="
          curl -sf --max-time 15 \
            "https://api.bcb.gov.br/dados/serie/bcdata.sgs.13522/dados/ultimos/1?formato=json" \
            -o ipca_raw.json || echo "[]" > ipca_raw.json

          echo "=== Focus Selic anual ==="
          curl -sf --max-time 20 \
            "https://olinda.bcb.gov.br/olinda/servico/Expectativas/versao/v1/odata/ExpectativasMercadoAnuais?\$filter=Indicador%20eq%20'Selic'%20and%20Suavizado%20eq%20'S'&\$orderby=Data%20desc,DataReferencia%20asc&\$top=16&\$format=json&\$select=Data,DataReferencia,Mediana,Minimo,Maximo" \
            -o focus_selic_raw.json || echo '{"value":[]}' > focus_selic_raw.json

          echo "=== Focus IPCA anual ==="
          curl -sf --max-time 20 \
            "https://olinda.bcb.gov.br/olinda/servico/Expectativas/versao/v1/odata/ExpectativasMercadoAnuais?\$filter=Indicador%20eq%20'IPCA'%20and%20Suavizado%20eq%20'S'&\$orderby=Data%20desc,DataReferencia%20asc&\$top=16&\$format=json&\$select=Data,DataReferencia,Mediana,Minimo,Maximo" \
            -o focus_ipca_raw.json || echo '{"value":[]}' > focus_ipca_raw.json

      - name: Processar e gerar dados.json
        run: |
          python3 << 'PYEOF'
          import json
          from datetime import datetime, timedelta, date

          # fallback
          try:
              anterior = json.load(open('dados.json'))
          except:
              anterior = {}

          erros = []

          # ── Selic efetiva ────────────────────────────────────────────
          selic_val = anterior.get("selic", 14.65)
          try:
              d = json.load(open('selic_raw.json'))
              v = float(d[0]["valor"].replace(",","."))
              if 5 < v < 30:
                  selic_val = round(v, 2)
                  print(f"  Selic efetiva: {selic_val}%")
          except Exception as e:
              erros.append(f"selic: {e}")

          # ── Selic meta (decisão Copom) ───────────────────────────────
          selic_meta = anterior.get("selicMeta", 14.75)
          try:
              d = json.load(open('selic_meta_raw.json'))
              v = float(d[0]["valor"].replace(",","."))
              if 5 < v < 30:
                  selic_meta = round(v, 2)
                  print(f"  Selic meta: {selic_meta}%")
          except Exception as e:
              erros.append(f"selic_meta: {e}")

          # ── IPCA ─────────────────────────────────────────────────────
          ipca_val = anterior.get("ipca", 4.80)
          try:
              d = json.load(open('ipca_raw.json'))
              v = float(d[0]["valor"].replace(",","."))
              if 0 < v < 30:
                  ipca_val = round(v, 2)
                  print(f"  IPCA 12m: {ipca_val}%")
          except Exception as e:
              erros.append(f"ipca: {e}")

          # ── Focus Selic anual ────────────────────────────────────────
          focus_selic = anterior.get("focusSelic", [])
          data_boletim_selic = ""
          try:
              d = json.load(open('focus_selic_raw.json'))
              items = d.get("value", [])
              if items:
                  data_boletim_selic = items[0]["Data"]
                  recentes = [x for x in items if x["Data"] == data_boletim_selic]
                  vistos = {}
                  for x in recentes:
                      ano = int(x["DataReferencia"])
                      if ano not in vistos:
                          vistos[ano] = {
                              "ano":      ano,
                              "mediana":  round(float(x["Mediana"]), 2),
                              "min":      round(float(x["Minimo"]),  2),
                              "max":      round(float(x["Maximo"]),  2),
                          }
                  focus_selic = sorted(vistos.values(), key=lambda x: x["ano"])
                  print(f"  Focus Selic: {len(focus_selic)} anos (boletim {data_boletim_selic})")
          except Exception as e:
              erros.append(f"focus_selic: {e}")

          # ── Focus IPCA anual ─────────────────────────────────────────
          focus_ipca = anterior.get("focusIPCA", [])
          data_boletim_ipca = ""
          try:
              d = json.load(open('focus_ipca_raw.json'))
              items = d.get("value", [])
              if items:
                  data_boletim_ipca = items[0]["Data"]
                  recentes = [x for x in items if x["Data"] == data_boletim_ipca]
                  vistos = {}
                  for x in recentes:
                      ano = int(x["DataReferencia"])
                      if ano not in vistos:
                          med = round(float(x["Mediana"]), 2)
                          vistos[ano] = {
                              "ano":      ano,
                              "mediana":  med,
                              "min":      round(float(x["Minimo"]),  2),
                              "max":      round(float(x["Maximo"]),  2),
                              "meta":     "acima da meta" if med > 4.5
                                          else "abaixo da meta" if med < 1.5
                                          else "dentro da meta"
                          }
                  focus_ipca = sorted(vistos.values(), key=lambda x: x["ano"])
                  print(f"  Focus IPCA: {len(focus_ipca)} anos (boletim {data_boletim_ipca})")
          except Exception as e:
              erros.append(f"focus_ipca: {e}")

          # ── Calendário Copom com trajetória automática ───────────────
          # Datas oficiais publicadas pelo BCB — segundo dia = data da decisão
          DATAS_COPOM = [
              {"data": "2026-04-29", "ano": 2026},  # 28 e 29 de abril
              {"data": "2026-06-17", "ano": 2026},  # 16 e 17 de junho
              {"data": "2026-08-05", "ano": 2026},  # 04 e 05 de agosto
              {"data": "2026-09-16", "ano": 2026},  # 15 e 16 de setembro
              {"data": "2026-11-04", "ano": 2026},  # 03 e 04 de novembro
              {"data": "2026-12-09", "ano": 2026},  # 08 e 09 de dezembro
              {"data": "2027-02-03", "ano": 2027},  # provisório
              {"data": "2027-03-17", "ano": 2027},
              {"data": "2027-05-05", "ano": 2027},
              {"data": "2027-06-16", "ano": 2027},
              {"data": "2027-07-28", "ano": 2027},
              {"data": "2027-09-15", "ano": 2027},
              {"data": "2027-11-03", "ano": 2027},
              {"data": "2027-12-08", "ano": 2027},
          ]

          def alvo_ano(ano):
              for f in focus_selic:
                  if f["ano"] == ano:
                      return f["mediana"]
              return selic_meta

          alvo_2026 = alvo_ano(2026)
          alvo_2027 = alvo_ano(2027)

          r2026 = [r for r in DATAS_COPOM if r["ano"] == 2026]
          r2027 = [r for r in DATAS_COPOM if r["ano"] == 2027]

          # Queda por reunião arredondada a 0,25pp
          def queda_por_reuniao(de, ate, n):
              total = de - ate
              por_reuniao = total / n if n > 0 else 0
              return round(round(por_reuniao / 0.25) * 0.25, 2)

          q2026 = queda_por_reuniao(selic_meta, alvo_2026, len(r2026))
          q2027 = queda_por_reuniao(alvo_2026,  alvo_2027, len(r2027))

          hoje = date.today()
          copom_calendario = []
          selic_copom = selic_meta

          for r in r2026:
              dr = date.fromisoformat(r["data"])
              realizada = dr < hoje
              if not realizada:
                  selic_copom = round(selic_copom - q2026, 2)
              copom_calendario.append({
                  "data":      r["data"],
                  "selic":     round(selic_copom, 2),
                  "realizada": realizada
              })

          for r in r2027:
              dr = date.fromisoformat(r["data"])
              realizada = dr < hoje
              if not realizada:
                  selic_copom = round(selic_copom - q2027, 2)
              copom_calendario.append({
                  "data":      r["data"],
                  "selic":     round(selic_copom, 2),
                  "realizada": realizada
              })

          print(f"  Copom: {selic_meta}% → {alvo_2026}% (2026) → {alvo_2027}% (2027)")
          print(f"  Queda/reunião: {q2026}pp em 2026, {q2027}pp em 2027")

          # ── Salva dados.json ─────────────────────────────────────────
          now_utc = datetime.utcnow()
          now_brt = now_utc - timedelta(hours=3)

          resultado = {
              "selic":           selic_val,
              "selicMeta":       selic_meta,
              "selicProjetada":  focus_selic[0]["mediana"] if focus_selic else 13.0,
              "ipca":            ipca_val,
              "focusSelic":      focus_selic,
              "focusIPCA":       focus_ipca,
              "focusData":       data_boletim_selic or data_boletim_ipca,
              "copomCalendario": copom_calendario,
              "atualizadoEm":    now_brt.strftime("%d/%m/%Y às %H:%Mh (horário de Brasília)"),
              "atualizadoEmISO": now_utc.strftime("%Y-%m-%dT%H:%M:%SZ"),
              "erros":           erros
          }

          with open('dados.json', 'w') as f:
              json.dump(resultado, f, ensure_ascii=False, indent=2)

          print(f"\n✓ dados.json salvo")
          if erros:
              print(f"  Avisos: {erros}")
          PYEOF

      - name: Commit e push
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add dados.json
          git diff --staged --quiet || git commit -m "chore: atualiza taxas + Focus + Copom $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push
